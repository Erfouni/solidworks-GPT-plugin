name: Feature request
description: Propose a focused improvement to the plugin workflow or tooling.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Engineering or workflow problem
      description: Describe the real task that is difficult today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the desired result without assuming a particular implementation.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Measurable acceptance criteria
      description: List the validation evidence that would prove the feature works.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request preserves explicit consent for feedback submission.
          required: true
        - label: This request does not require storing secrets in the repository.
          required: true
